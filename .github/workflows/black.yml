name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
      - uses: psf/black@stable
        with:
          options: "--check --verbose --target-version py314"
          use_pyproject: true
